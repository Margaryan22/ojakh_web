# CI: линт, типы, тесты и сборка обоих пакетов + проверка Docker-образов.
# Деплой остаётся ручным (scripts/deploy.sh на VPS) — CI только контролирует
# качество на push в main и в pull request'ах.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Версию pnpm берёт из packageManager корневого package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Тесты — юнит с моками Prisma, БД не нужна; клиент генерируем для типов
      - run: pnpm --filter backend prisma:generate
      - run: pnpm --filter backend lint
      - run: pnpm --filter backend typecheck
      - run: pnpm --filter backend test
      - run: pnpm --filter backend build

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    env:
      # next build вшивает NEXT_PUBLIC_* в бандл — для CI хватает плейсхолдеров
      NEXT_PUBLIC_API_URL: https://ojakh.api.whysargis.ru
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter frontend lint
      - run: pnpm --filter frontend typecheck
      - run: pnpm --filter frontend build

  docker:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Образы только собираются (без пуша) — ловим расхождения зависимостей
      # и поломки Dockerfile до деплоя.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
