services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ojakh
      POSTGRES_USER: ojakh
      # Без дефолта нарочно: compose откажется стартовать, если переменная не
      # задана (в .env рядом с docker-compose.yml или в окружении). Если
      # существующая БД была инициализирована со старым дефолтом "secret" —
      # задайте POSTGRES_PASSWORD=secret и затем смените пароль в Postgres.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ojakh']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ojakh-backend:latest
    platform: linux/amd64
    build:
      # Контекст — корень репо: pnpm-lock.yaml общий для workspace.
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Зеркала на случай недоступности официальных источников с сервера:
        # NPM_REGISTRY=https://registry.npmmirror.com
        # PRISMA_ENGINES_MIRROR=https://registry.npmmirror.com/-/binary/prisma
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org}
        - PRISMA_ENGINES_MIRROR=${PRISMA_ENGINES_MIRROR:-https://binaries.prisma.sh}
    # Порт привязан к loopback: снаружи трафик идёт только через nginx (TLS,
    # security-заголовки, rate limiting). Локальная привязка оставлена для
    # отладки с сервера (curl localhost:3001) и SSH-туннелей.
    ports:
      - '127.0.0.1:3001:3001'
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # ВАЖНО: рабочая директория приложения — /app/backend (см. Dockerfile),
      # UPLOADS_DIR=./uploads резолвится в /app/backend/uploads.
      - uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      # Контекст — корень репо: pnpm-lock.yaml общий для workspace.
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org}
        - NEXT_PUBLIC_API_URL=${API_URL:-https://ojakh.api.whysargis.ru}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
        - NEXT_PUBLIC_APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
        - NEXT_PUBLIC_YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID:-}
        - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
        - NEXT_PUBLIC_YANDEX_VERIFICATION=${YANDEX_VERIFICATION:-}
        - NEXT_PUBLIC_GOOGLE_VERIFICATION=${GOOGLE_VERIFICATION:-}
    # См. комментарий у backend: наружу — только через nginx.
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 10s
      retries: 3

  # Ежедневный бэкап: дамп БД + архив загруженных файлов в ./backups на хосте
  # (последние 14 суток). Восстановление — scripts/restore-backup.sh.
  # Оффсайт-копия: задайте RCLONE_REMOTE (например "s3:ojakh-backups") и
  # положите конфиг rclone в ./rclone/rclone.conf (`rclone config` локально).
  # Мониторинг: HEALTHCHECK_URL (healthchecks.io) — ping после успешного
  # прогона; пропавший ежедневный ping = сломанные бэкапы.
  backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-}
      HEALTHCHECK_URL: ${BACKUP_HEALTHCHECK_URL:-}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
      - ./rclone:/config/rclone:ro
      - uploads:/uploads:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: >-
      /bin/sh -c 'while :; do /backup.sh; sleep 24h & wait $${!}; done'

  nginx:
    image: nginx:1.25-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    # Reload nginx every 6h so it picks up renewed certs from the shared
    # certbot-etc volume without manual intervention.
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done &
      exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    restart: unless-stopped
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data:
  uploads:
  certbot-etc:
  certbot-var:
  certbot-webroot:
