# Сжатие текстовых ответов (HTML/JSON/JS/CSS). Картинки уже сжаты — не трогаем.
gzip              on;
gzip_types        text/plain text/css application/json application/javascript
                  application/xml image/svg+xml;
gzip_min_length   1024;
gzip_vary         on;

# Rate limiting для /auth/* — грубая внешняя защита от перебора паролей.
# Тонкие лимиты (5 запросов/мин на логин) обеспечивает throttler бекенда.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name ojakh.whysargis.ru ojakh.api.whysargis.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: ojakh.whysargis.ru
server {
    listen 443 ssl http2;
    server_name ojakh.whysargis.ru;

    ssl_certificate     /etc/letsencrypt/live/ojakh.whysargis.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ojakh.whysargis.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Backend API: ojakh.api.whysargis.ru
server {
    listen 443 ssl http2;
    server_name ojakh.api.whysargis.ru;

    ssl_certificate     /etc/letsencrypt/live/ojakh.whysargis.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ojakh.whysargis.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Загрузка картинок в админке: до 5 МБ файл + накладные расходы multipart.
    client_max_body_size 10m;

    # SSE-поток событий: буферизацию отключаем, иначе nginx копит ответ и
    # события не доходят до клиента. Таймаут больше heartbeat-интервала (25с).
    location /events/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
    }

    # Auth-эндпоинты — с лимитом запросов (защита от перебора).
    location /auth/ {
        limit_req          zone=auth_limit burst=20 nodelay;
        limit_req_status   429;

        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
