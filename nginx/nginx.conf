# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name ojakh.whysargis.ru ojakh.api.whysargis.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: ojakh.whysargis.ru
server {
    listen 443 ssl http2;
    server_name ojakh.whysargis.ru;

    ssl_certificate     /etc/letsencrypt/live/ojakh.whysargis.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ojakh.whysargis.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Backend API: ojakh.api.whysargis.ru
server {
    listen 443 ssl http2;
    server_name ojakh.api.whysargis.ru;

    ssl_certificate     /etc/letsencrypt/live/ojakh.whysargis.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ojakh.whysargis.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
