# Временный HTTP конфиг для получения SSL сертификата.
# После получения сертификата заменяется на nginx.conf.
server {
    listen 80;
    server_name ojakh.whysargis.ru ojakh.api.whysargis.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Waiting for SSL setup...';
        add_header Content-Type text/plain;
    }
}
