services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ojakh
      POSTGRES_USER: ojakh
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ojakh']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
