# Override для первичного получения SSL сертификата.
# Используется скриптом scripts/init-ssl.sh — не запускать напрямую.
services:
  nginx:
    volumes:
      - ./nginx/nginx-initial.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on: []
